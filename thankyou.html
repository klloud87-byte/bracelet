<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#C4895A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="lodybracelets">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شكراً على طلبك — lodybracelets</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Amiri:wght@700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Cairo', sans-serif;
  background: #FAF7F4;
  color: #1C1410;
  direction: rtl;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: white;
  border-radius: 32px;
  padding: 48px 36px;
  max-width: 480px;
  width: 100%;
  text-align: center;
  box-shadow: 0 24px 48px rgba(28,20,16,.1);
  border: 1px solid #F0E8E2;
}
.icon { font-size: 4rem; margin-bottom: 20px; }
.title {
  font-family: 'Amiri', serif;
  font-size: 2rem;
  font-weight: 700;
  color: #1C1410;
  margin-bottom: 12px;
}
.subtitle {
  font-size: .95rem;
  color: #6B5B52;
  line-height: 1.8;
  margin-bottom: 32px;
}
.order-info {
  background: #FAF7F4;
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 28px;
  border: 1px solid #F0E8E2;
}
.order-info-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid #F0E8E2;
  font-size: .85rem;
}
.order-info-row:last-child { border-bottom: none; }
.order-info-label { color: #9C8880; }
.order-info-value { font-weight: 700; color: #1C1410; }
.btn-wa {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: linear-gradient(135deg, #22C55E, #16A34A);
  color: white;
  text-decoration: none;
  padding: 15px 28px;
  border-radius: 60px;
  font-size: .9rem;
  font-weight: 700;
  margin-bottom: 12px;
  transition: all .3s;
  box-shadow: 0 8px 24px rgba(34,197,94,.28);
}
.btn-wa:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(34,197,94,.38); }
.btn-back {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: transparent;
  border: 1.5px solid #E8DDD6;
  color: #6B5B52;
  text-decoration: none;
  padding: 13px 28px;
  border-radius: 60px;
  font-size: .85rem;
  font-weight: 600;
  transition: all .25s;
}
.btn-back:hover { border-color: #C4895A; color: #C4895A; background: rgba(196,137,90,.08); }
.note {
  margin-top: 24px;
  font-size: .72rem;
  color: #9C8880;
  line-height: 1.7;
}
.confetti { font-size: 1.4rem; }
.countdown-bar-wrap {
  margin-top: 10px;
  height: 4px;
  background: #F0E8E2;
  border-radius: 99px;
  overflow: hidden;
}
.countdown-bar {
  height: 100%;
  width: 100%;
  background: #C4895A;
  transition: width 1s linear;
  border-radius: 99px;
}
.redirect-note {
  margin-top: 20px;
  font-size: .78rem;
  color: #9C8880;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.redirect-note span {
  font-weight: 700;
  color: #6B5B52;
  font-size: .85rem;
}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🎀</div>
  <h1 class="title">شكراً على طلبك!</h1>
  <p class="subtitle">
    تم استلام طلبك بنجاح ✨<br>
    سنتواصل معكِ عبر واتساب خلال <strong>24 ساعة</strong> لتأكيد الطلب وتفاصيل التوصيل.
  </p>

  <div class="order-info" id="orderDetails" style="display:none;">
    <div class="order-info-row">
      <span class="order-info-label">المنتج</span>
      <span class="order-info-value" id="tdProduct">—</span>
    </div>
    <div class="order-info-row">
      <span class="order-info-label">الاسم</span>
      <span class="order-info-value" id="tdName">—</span>
    </div>
    <div class="order-info-row">
      <span class="order-info-label">الولاية</span>
      <span class="order-info-value" id="tdWilaya">—</span>
    </div>
    <div class="order-info-row">
      <span class="order-info-label">الكمية</span>
      <span class="order-info-value" id="tdQty">—</span>
    </div>
  </div>

  <a href="https://wa.me/213556486243" class="btn-wa" target="_blank">
    💬 تواصل معنا عبر واتساب
  </a>
  <a href="index.html" class="btn-back">
    ← العودة للمتجر
  </a>
<div class="redirect-note">
  سيتم الرجوع للمتجر تلقائياً خلال <span id="countdown">60</span> ثانية
</div>
<div class="countdown-bar-wrap">
  <div class="countdown-bar" id="countdownBar"></div>
</div>
  <p class="note">
    كل قطعة تُصنع بحب خصيصاً لكِ ✦<br>
    مدة التصنيع العادية: 3 إلى 5 أيام
  </p>
</div>

<script>
const params = new URLSearchParams(location.search);
const product = params.get('product');
const name    = params.get('name');
const wilaya  = params.get('wilaya');
const qty     = params.get('qty');

if (product || name) {
  document.getElementById('orderDetails').style.display = 'block';
  if (product) document.getElementById('tdProduct').textContent = decodeURIComponent(product);
  if (name)    document.getElementById('tdName').textContent    = decodeURIComponent(name);
  if (wilaya)  document.getElementById('tdWilaya').textContent  = decodeURIComponent(wilaya);
  if (qty)     document.getElementById('tdQty').textContent     = qty;
}

let seconds = 60;
const cdEl  = document.getElementById('countdown');
const cdBar = document.getElementById('countdownBar');
const timer = setInterval(() => {
  seconds--;
  cdEl.textContent = seconds;
  cdBar.style.width = (seconds / 60 * 100) + '%';
  if (seconds <= 0) {
    clearInterval(timer);
    window.location.href = 'index.html';
  }
}, 1000);

document.querySelector('.btn-wa').addEventListener('click', () => clearInterval(timer));
</script>
</body>
</html>
